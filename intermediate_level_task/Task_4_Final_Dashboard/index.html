<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>QSkill AI Multi-Utility Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .main-header { background: #212529; color: white; padding: 20px 0; margin-bottom: 30px; text-align: center; }
        .card { border-radius: 15px; border: none; }
    </style>
</head>
<body>

<div class="main-header shadow">
    <h1>QSkill AI Dashboard</h1>
    <p>Slab 2: Intermediate Level Integration</p>
</div>

<div class="container">
    <div class="row g-4">
        <div class="col-md-6">
            <div class="card shadow-sm p-4">
                <h3 class="text-primary border-bottom pb-2">Sentiment Analyzer</h3>
                <form action="/analyze" method="POST" class="mt-3">
                    <textarea name="sentiment_text" class="form-control mb-3" rows="3" placeholder="How are you feeling?"></textarea>
                    <button class="btn btn-primary w-100">Analyze Tone</button>
                </form>
                {% if sentiment_res %}
                <div class="alert alert-{{color}} mt-4">
                    <strong>Result: {{sentiment_res}}</strong> (Score: {{pol}})
                </div>
                {% endif %}
            </div>
        </div>

        <div class="col-md-6">
            <div class="card shadow-sm p-4">
                <h3 class="text-success border-bottom pb-2">Gemini AI Search</h3>
                <form action="/search" method="POST" class="mt-3">
                    <input type="text" name="search_query" class="form-control mb-3" placeholder="Search the web with AI...">
                    <button class="btn btn-success w-100">Smart Search</button>
                </form>
                {% if search_answer %}
                <div class="mt-4 p-3 bg-white border rounded shadow-sm">
                    <h6>Results for: {{user_query}}</h6>
                    <hr>
                    <p style="white-space: pre-wrap;">{{search_answer}}</p>
                </div>
                {% endif %}
            </div>
        </div>
    </div>
</div>

<footer class="text-center mt-5 text-muted">
    <p>&copy; 2026 Python Internship Project</p>
</footer>

</body>
</html>
